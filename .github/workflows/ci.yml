# CI: fail fast on config validation, then prove the whole pipeline —
# migrations apply cleanly on a fresh PostGIS, a town loads end-to-end, and
# the geometry functions return unit-correct answers. Same PostGIS image as
# docker-compose, so local and CI mean the same thing.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-configs:
    name: Validate configs (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python scripts/validate_configs.py

  migrate-and-load:
    name: Migrations + town load on PostGIS
    runs-on: ubuntu-latest
    needs: validate-configs
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: demarco
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/demarco
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Apply migrations (twice — must be idempotent)
        run: |
          python scripts/migrate.py
          python scripts/migrate.py

      - name: Smoke-load a town (example rates stand in for the private card)
        run: |
          for f in config/rates/*.rates.example.json; do
            cp "$f" "${f%.rates.example.json}.rates.json"
          done
          python scripts/load_town.py --all

      - name: Geometry unit check (100x100 ft lot, 10 ft inset -> 6400 sqft)
        run: |
          python - <<'EOF'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()
          cur.execute("""
              SELECT ST_Area(buildable_envelope(
                  ST_GeomFromText('POLYGON((0 0,100 0,100 100,0 100,0 0))', 3424), 10)),
                     max_footprint_sqft(
                  buildable_envelope(
                      ST_GeomFromText('POLYGON((0 0,100 0,100 100,0 100,0 0))', 3424), 10),
                  10000, 40),
                     max_buildable_sqft(4000, 3)
          """)
          env_area, footprint, buildable = cur.fetchone()
          assert abs(env_area - 6400) < 1, f"envelope area {env_area}, expected 6400"
          assert abs(footprint - 4000) < 1, f"footprint {footprint}, expected 4000 (coverage binds)"
          assert buildable == 12000, f"buildable {buildable}, expected 12000"
          cur.execute("SELECT count(*) FROM zoning_districts")
          n = cur.fetchone()[0]
          assert n > 0, "no zoning districts loaded"
          print(f"geometry checks passed; {n} district(s) loaded")
          EOF

  web:
    name: React app build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  # Applies pending migrations to the live Supabase database on pushes to main.
  # No-op until the SUPABASE_DB_URL secret is set (repo Settings -> Secrets).
  deploy-supabase:
    name: Deploy migrations to Supabase
    runs-on: ubuntu-latest
    needs: [migrate-and-load]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Migrate Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "SUPABASE_DB_URL secret not set -- skipping live deploy."
            exit 0
          fi
          python scripts/migrate.py
